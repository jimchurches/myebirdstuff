# Shared defaults for `streamlit run explorer/app/streamlit/app.py` from repo root.
# Streamlit Cloud reads app settings from the dashboard; this file is optional locally.
#
# Theme: approximate eBird-style greens (forest / teal used on ebird.org and My eBird).
# Not official brand tokens — only Streamlit [theme] keys, no custom CSS.
# Hoisted ``st.spinner`` tweaks in ``explorer/app/streamlit/app.py`` (_THEME_*) mirror these hex values.

[theme]
base = "light"
primaryColor = "#1F6F54"
backgroundColor = "#FAFCFA"
secondaryBackgroundColor = "#EEF4F0"
textColor = "#1A2E22"

# Sidebar widgets (toggle, slider) use this when set; otherwise some hosts inherit main theme only.
[theme.sidebar]
primaryColor = "#1F6F54"

[browser]
gatherUsageStats = false
