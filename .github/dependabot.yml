version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    target-branch: "beta-next"
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    target-branch: "beta-next"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"