# Refs #189: release tag must match committed Explorer build id.
name: Explorer build version (tag)

on:
  push:
    tags:
      - "20*"

permissions:
  contents: read

jobs:
  tag-matches-embedded-version:
    name: Tag matches explorer_build_version.txt
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify tag equals embedded build version
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          embedded="$(tr -d '[:space:]' < explorer/app/streamlit/explorer_build_version.txt)"
          tag="${TAG_NAME#v}"
          if [[ "$tag" != "$embedded" ]]; then
            echo "::error::Git tag must match explorer/app/streamlit/explorer_build_version.txt (after stripping optional leading v). tag=$tag embedded=$embedded"
            exit 1
          fi
          python scripts/verify_explorer_build_version.py
