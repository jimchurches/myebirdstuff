name: Python CI

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, beta-next]
  pull_request:
    branches: [main, beta-next]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run optional Streamlit Playwright E2E example tests"
        required: false
        default: "false"

jobs:
  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Ensure gitignored config files are not tracked
        run: |
          set -euo pipefail
          # Must stay local only (see .gitignore); accidental -f add would bypass ignore rules.
          tracked=$(git ls-files -- config/config.yaml config/config_secret.yaml || true)
          if [ -n "$tracked" ]; then
            echo "::error::Local config files must not be tracked by git. Remove from the index and use config_template.yaml / local files only."
            echo "$tracked"
            exit 1
          fi

  secret-scan:
    name: Secret scan (gitleaks)
    needs: repository-hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2

  lint-ruff:
    name: Lint (Ruff)
    needs: repository-hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-gps-script.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-gps-script.txt

      - name: Run Ruff on explorer/
        run: ruff check explorer/

  dependency-audit:
    name: Dependency audit (pip-audit)
    needs: repository-hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-gps-script.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-gps-script.txt

      - name: Cache pip-audit vulnerability DB
        uses: actions/cache@v4
        with:
          path: .pip-audit-cache
          key: pip-audit-${{ runner.os }}-${{ hashFiles('requirements.txt', 'requirements-gps-script.txt') }}

      - name: Install pip-audit and scan requirements
        run: |
          python -m pip install --upgrade pip-audit
          pip-audit -r requirements.txt -r requirements-gps-script.txt --cache-dir .pip-audit-cache

  unit-tests:
    name: Unit tests (pytest + baseline coverage guardrail)
    needs: repository-hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-gps-script.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-gps-script.txt

      - name: Run pytest with coverage baseline (fail under 65%)
        run: |
          # Signal-first policy: this threshold is a floor to catch major blind spots,
          # not a target to optimize at the expense of low-value tests.
          pytest tests/ -v \
            --cov=explorer \
            --cov-report=term-missing \
            --cov-fail-under=65

      - name: Check Streamlit debug defaults (defaults.py)
        if: success()
        run: python scripts/warn_streamlit_debug_defaults.py

      - name: Run GPS checklist script offline test
        run: python scripts/eBirdChecklistNameFromGPS.py --testfile tests/fixtures/gps_checklistName_testing.json

  e2e-map-example:
    name: Optional E2E (Streamlit + Playwright example)
    if: github.event_name == 'workflow_dispatch' && inputs.run_e2e == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-gps-script.txt

      - name: Install Python dependencies + Playwright
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-gps-script.txt
          pip install playwright

      - name: Install Playwright browser
        run: python -m playwright install chromium

      - name: Run optional e2e marker tests
        run: pytest tests/explorer/test_streamlit_map_e2e.py -m e2e -v
