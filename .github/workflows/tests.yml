name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-gps-script.txt

      - name: Audit Python dependencies (pip-audit)
        run: |
          python -m pip install --upgrade pip-audit
          # Temporary allowlist: CVE-2026-4539 has no fix version yet (pip-audit reports none).
          # Keep failing on any other vulnerability.
          pip-audit -r requirements.txt -r requirements-gps-script.txt --ignore-vuln CVE-2026-4539 --cache-dir .pip-audit-cache

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=explorer \
            --cov-report=term-missing \
            --cov-fail-under=65

      - name: Run GPS script offline tests
        run: python scripts/eBirdChecklistNameFromGPS.py --testfile tests/fixtures/gps_checklistName_testing.json
